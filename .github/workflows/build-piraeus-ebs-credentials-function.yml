name: Build Piraeus EBS credentials function

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - functions/piraeus-ebs-credentials/**
      - .github/workflows/build-piraeus-ebs-credentials-function.yml
  pull_request:
    paths:
      - functions/piraeus-ebs-credentials/**
      - .github/workflows/build-piraeus-ebs-credentials-function.yml
  workflow_dispatch:

env:
  GO_VERSION: "1.25.11"
  XPKG: ghcr.io/mateo-moon/function-piraeus-ebs-credentials

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: functions/piraeus-ebs-credentials/go.sum
      - name: Test
        working-directory: functions/piraeus-ebs-credentials
        run: go test -race ./...
      - name: Verify module files
        working-directory: functions/piraeus-ebs-credentials
        run: go mod tidy && git diff --exit-code go.mod go.sum

  build:
    runs-on: ubuntu-24.04
    needs: test
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: functions/piraeus-ebs-credentials
          platforms: linux/${{ matrix.arch }}
          target: image
          build-args: GO_VERSION=${{ env.GO_VERSION }}
          outputs: type=docker,dest=runtime-${{ matrix.arch }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - name: Build function package
        run: ./crossplane xpkg build --package-file=${{ matrix.arch }}.xpkg --package-root=functions/piraeus-ebs-credentials/package --embed-runtime-image-tarball=runtime-${{ matrix.arch }}.tar
      - uses: actions/upload-artifact@v4
        with:
          name: piraeus-ebs-credentials-${{ matrix.arch }}
          path: "*.xpkg"
          if-no-files-found: error
          retention-days: 1

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: piraeus-ebs-credentials-*
          path: .
          merge-multiple: true
      - name: Install Crossplane CLI
        run: curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | sh
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish immutable package
        run: ./crossplane xpkg push --package-files amd64.xpkg,arm64.xpkg "${XPKG}:sha-${GITHUB_SHA::12}"
      - name: Publish latest package
        if: github.ref == 'refs/heads/main'
        run: ./crossplane xpkg push --package-files amd64.xpkg,arm64.xpkg "${XPKG}:latest"
